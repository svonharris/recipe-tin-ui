name: Storybook Documentation

on:
  push:
    branches:
      - main //name of branch

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.build-publish.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - id: build-publish
        uses: bitovi/github-actions-storybook-to-github-pages@v1.0.4
        with:
          path: storybook-static //path to build folder
          branch: gh-pages //GitHub pages branch
